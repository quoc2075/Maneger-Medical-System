{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhòngKhám+ — Hệ thống Quản lý Phòng khám</title>
  
  <!-- Fonts & Icons (giữ nguyên) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Static CSS - Dùng Django template tag -->
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  
  <style>
    #splash {
      position: fixed; inset: 0;
      background: #0A2342;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      z-index: 9999; transition: opacity 0.4s ease;
    }
    .splash-logo { font-size: 64px; }
    .splash-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; }
    .splash-bar-fill { width: 0%; height: 100%; background: #00C9A7; animation: splash-load 1.5s ease forwards; }
    @keyframes splash-load { to { width: 100%; } }
  </style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">🏥</div>
  <h1>Phòng<span>Khám</span>+</h1>
  <p>Hệ thống Quản lý Phòng khám</p>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
</div>

<div id="app-root"></div>

<!-- Core JavaScript - Dùng static tags -->
<script src="{% static 'js/api.js' %}?v=20260420-1"></script>
<script src="{% static 'js/shared/role-dashboard-shell.js' %}?v=20260504-1"></script>

<!-- Page JavaScript -->
<script src="{% static 'js/pages/login.js' %}?v=20260407-3"></script>
<script src="{% static 'js/pages/admin/dashboard.js' %}?v=20260420-5"></script>
<script src="{% static 'js/pages/benh-nhan/dashboard.js' %}?v=20260504-1"></script>
<script src="{% static 'js/pages/benh-nhan/ho-so.js' %}?v=20260407-3"></script>
<script src="{% static 'js/pages/benh-nhan/lich-hen.js' %}?v=20260413-1"></script>
<script src="{% static 'js/pages/benh-nhan/don-thuoc.js' %}?v=20260407-3"></script>
<script src="{% static 'js/pages/benh-nhan/mua-thuoc.js' %}?v=20260420-1"></script>
<script src="{% static 'js/pages/benh-nhan/chat.js' %}?v=20260407-3"></script>
<script src="{% static 'js/pages/benh-nhan/thong-bao.js' %}?v=20260504-1"></script>
<script src="{% static 'js/pages/le-tan/dashboard.js' %}?v=20260504-1"></script>
<script src="{% static 'js/pages/bac-si/dashboard.js' %}?v=20260504-1"></script>
<script src="{% static 'js/pages/ban-thuoc/dashboard.js' %}?v=20260504-1"></script>
<script src="{% static 'js/pages/kho/dashboard.js' %}?v=20260504-1"></script>
<script src="{% static 'js/pages/ke-toan/dashboard.js' %}?v=20260504-1"></script>


<script>

    (function() {
        setTimeout(function() {
            const splash = document.getElementById('splash');
            if (splash) {
                splash.style.opacity = '0';
                setTimeout(function() {
                    splash.remove();
                }, 400);
            }
        }, 1000);
    })();
</script>

</body>
</html>
